name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual testing from the Actions tab

permissions:
  contents: write

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish linux-x64
        run: |
          dotnet publish JADY/JADY.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:IncludeAllContentForSelfExtract=true \
            -o ./publish/linux-x64
          
      - name: Get Changelog Entry
        id: changelog
        run: |
          # 1. Get the tag name (e.g., v1.0.4)
          TAG="${{ github.ref_name }}"
          # 2. Remove the 'v' prefix if CHANGELOG.md headers don't use it (e.g., [1.0.4])
          VERSION=${TAG#v}
          
          # 3. Use sed to extract lines between the version header and the next header
          # This assumes the file uses ## [1.0.4] or ## [v1.0.4]
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' > release_notes.txt
          
          # 4. Save to a multi-line output variable
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/linux-x64/JADY
          body: ${{ steps.changelog.outputs.notes }}
          # Only create an actual release if triggered by a tag
          # If manual (dispatch), it marks it as a draft so it's hidden from users
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          tag_name: ${{ github.ref_name }}